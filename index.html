<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap"
      />
    </noscript>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design By Veronika — Interior Design, Dubai</title>
    <meta name="description" content="Boutique interior design studio in Dubai. Specialising in villa renovations, apartment interiors, and luxury furnishing. Book a consultation with Veronika today." />
    <link rel="canonical" href="https://interiordesignforyou.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Design by Veronika" />
    <meta property="og:title" content="Design By Veronika — Interior Design, Dubai" />
    <meta property="og:description" content="Boutique interior design studio in Dubai. Specialising in villa renovations, apartment interiors, and luxury furnishing. Book a consultation today." />
    <meta property="og:url" content="https://interiordesignforyou.com" />
    <meta property="og:image" content="https://interiordesignforyou.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_AE" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Design By Veronika — Interior Design, Dubai" />
    <meta name="twitter:description" content="Boutique interior design studio in Dubai. Specialising in villa renovations, apartment interiors, and luxury furnishing. Book a consultation today." />
    <meta name="twitter:image" content="https://interiordesignforyou.com/og-image.jpg" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["LocalBusiness", "ProfessionalService"],
      "name": "Design by Veronika",
      "description": "Boutique interior design studio in Dubai. Specialising in villa renovations, apartment interiors, and luxury furnishing.",
      "url": "https://interiordesignforyou.com",
      "telephone": "+971523226120",
      "email": "hello@interiordesignforyou.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dubai",
        "addressCountry": "AE"
      },
      "areaServed": [
        { "@type": "City", "name": "Dubai" },
        { "@type": "Country", "name": "United Arab Emirates" }
      ],
      "sameAs": ["https://www.instagram.com/interia.uae"],
      "founder": {
        "@type": "Person",
        "name": "Veronika",
        "jobTitle": "Founder & Interior Designer"
      },
      "serviceType": "Interior Design",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Interior Design Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Full Renovation" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Interior Rework" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Off-Plan Furnishing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Furniture Refresh" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Design from Scratch" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Retail Transformation" } }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
